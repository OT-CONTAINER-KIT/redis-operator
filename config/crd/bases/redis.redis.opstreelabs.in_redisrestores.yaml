  names:
    kind: RedisRestore
    listKind: RedisRestoreList
    plural: redisrestores
    shortNames:
    - rr
    - redisrestore
    singular: redisrestore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Target Redis cluster name
      jsonPath: .spec.redisClusterName
      name: Cluster
      type: string
    - description: Current restore phase
      jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RedisRestore defines a restore operation for a Redis cluster from a backup.
          When created, the operator downloads the backup from storage, scales down the
          target Redis, restores dump.rdb and node.conf, and scales it back up.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RedisRestoreSpec defines the desired state of a Redis restore
              operation
            properties:
              backupLocation:
                description: |-
                  BackupLocation is the full path to the backup directory in storage
                  Example: s3://my-bucket/backups/redis-cluster/2026-06-01T02-00-00Z
                type: string
              redisClusterName:
                description: RedisClusterName is the name of the target Redis resource
                  to restore to
                minLength: 1
                type: string
              s3:
                description: S3 holds configuration specific to AWS S3 storage
                properties:
                  bucket:
                    description: Bucket is the name of the S3 bucket where backups
                      will be stored
                    minLength: 3
                    type: string
                  endpoint:
                    description: Endpoint is an optional custom S3-compatible endpoint
                      URL (e.g. for MinIO)
                    type: string
                  region:
                    description: Region is the AWS region where the S3 bucket lives
                      (e.g. ap-south-1)
                    type: string
                  secretName:
                    description: |-
                      SecretName is the name of the Kubernetes Secret in the same namespace
                      that contains AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY keys
                    type: string
                required:
                - bucket
                - region
                - secretName
                type: object
              storageType:
                description: StorageType is the backend storage provider where the
                  backup is stored
                enum:
                - s3
                type: string
            required:
            - backupLocation
            - redisClusterName
            - storageType
            type: object
          status:
            description: RedisRestoreStatus reflects the observed state of a Redis
              restore
            properties:
              conditions:
                description: Conditions is a standard Kubernetes condition list
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
