# This rule is not used by the project redis-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions over redis.redis.opstreelabs.in RedisBackup resources.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: redisbackup-admin-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: redis-operator
    app.kubernetes.io/part-of: redis-operator
    app.kubernetes.io/managed-by: kustomize
  name: redisbackup-admin-role
rules:
- apiGroups:
  - redis.redis.opstreelabs.in
  resources:
  - redisbackups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - redis.redis.opstreelabs.in
  resources:
  - redisbackups/status
  verbs:
  - get
