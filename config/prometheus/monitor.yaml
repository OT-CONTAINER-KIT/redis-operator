
# Prometheus Monitor Service (Metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    control-plane: redis-operator
  name: redis-operator-metrics-monitor
  namespace: ot-operators
spec:
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        # The metrics endpoint serves a self-signed certificate generated by
        # controller-runtime. Set insecureSkipVerify to true for scraping, or
        # provide a CA bundle / cert-manager certificate for full verification.
        insecureSkipVerify: true
  selector:
    matchLabels:
      control-plane: redis-operator
