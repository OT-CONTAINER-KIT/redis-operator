apiVersion: redis.redis.opstreelabs.in/v1alpha1
kind: RedisRestore
metadata:
  name: redis-restore-sample
  namespace: default
spec:
  redisClusterName: redis-cluster
  storageType: s3
  backupLocation: "s3://my-redis-backups/backups/redis-cluster/2026-06-01T02-00-00Z"
  s3:
    bucket: my-redis-backups
    region: ap-south-1
    secretName: redis-s3-credentials
