---
# Pure-cache cluster (persistence disabled, no nodeConfVolume). The same shape
# used by the forget-stale-node test. For the rejoin-isolated-node test the
# persistence mode does not matter — isolation is injected directly with
# CLUSTER RESET SOFT — but a pure-cache cluster keeps the test fast and matches
# the real prod-cache topology where this failure mode is seen.
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-cluster-v1beta2
spec:
  clusterSize: 3
  clusterVersion: v7
  persistenceEnabled: false
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  redisFollower:
    replicas: 3
  kubernetesConfig:
    image: quay.io/opstree/redis:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 101m
        memory: 128Mi
      limits:
        cpu: 101m
        memory: 128Mi
  redisExporter:
    enabled: false
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: IfNotPresent
