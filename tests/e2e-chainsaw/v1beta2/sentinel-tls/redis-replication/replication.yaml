---
apiVersion: v1
kind: Secret
metadata:
  name: redis-replication-password
type: Opaque
data:
  # Opstree@1234replication
  password: T3BzdHJlZUAxMjM0cmVwbGljYXRpb24=
---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: redis-replication-sentinel-tls
spec:
  clusterSize: 3
  TLS:
    ca: ca.crt
    cert: tls.crt
    key: tls.key
    secret:
      secretName: redis-tls-cert
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  kubernetesConfig:
    redisSecret:
      name: redis-replication-password
      key: password
    image: quay.io/opstree/redis:latest
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 101m
        memory: 128Mi
      limits:
        cpu: 101m
        memory: 128Mi
  sentinel:
    size: 3
    image: quay.io/opstree/redis-sentinel:latest
    imagePullPolicy: Always
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
