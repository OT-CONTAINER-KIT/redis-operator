---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: redis-cluster-rejoin-isolated-node
spec:
  steps:
    - name: Create a cluster
      try:
        - apply:
            file: cluster.yaml
        - assert:
            file: ready-cluster.yaml

    # Isolate a follower in place with CLUSTER RESET SOFT: the node forgets every
    # peer (cluster_known_nodes drops to 1) and is turned into a lone, empty
    # master. This is the "isolated after restart" state — the node sees only
    # itself and will never rejoin on its own; previously an operator had to run
    # CLUSTER MEET (and CLUSTER REPLICATE) by hand.
    #
    # WITH the RejoinIsolatedNodes fix the operator probes each pod's CLUSTER
    # INFO, detects known_nodes<=1, MEETs the node back to leader-0 and (for a
    # follower) REPLICATEs it to its master, so the victim rejoins as a healthy
    # replica. WITHOUT the fix the node stays isolated and this step times out.
    - name: Isolate a follower and assert the operator rejoins it
      try:
        - script:
            timeout: 600s
            content: |
              set -eu
              NS="${NAMESPACE}"
              SEED="redis-cluster-v1beta2-leader-0"
              VICTIM="redis-cluster-v1beta2-follower-2"
              EXPECTED_NODES=6

              redis() { kubectl exec -n "${NS}" "$1" -- redis-cli "${@:2}"; }
              known() { redis "$1" cluster info 2>/dev/null | tr -d '\r' | awk -F: '/cluster_known_nodes:/{print $2}'; }

              BEFORE="$(known "${VICTIM}")"
              echo "victim ${VICTIM} known_nodes before=${BEFORE}"
              [ "${BEFORE}" = "${EXPECTED_NODES}" ] || { echo "precondition: victim not fully joined before injection"; exit 1; }

              # Inject isolation.
              redis "${VICTIM}" cluster reset soft
              ISO="$(known "${VICTIM}")"
              echo "victim known_nodes after reset=${ISO}"
              [ "${ISO}" = "1" ] || { echo "precondition: victim is not isolated after reset"; exit 1; }

              # The operator must rejoin it automatically — no manual MEET here.
              for i in $(seq 1 36); do
                CI="$(redis "${VICTIM}" cluster info 2>/dev/null | tr -d '\r' || true)"
                KNOWN="$(printf '%s\n' "${CI}" | awk -F: '/cluster_known_nodes:/{print $2}')"
                STATE="$(printf '%s\n' "${CI}" | awk -F: '/cluster_state:/{print $2}')"
                RI="$(redis "${VICTIM}" info replication 2>/dev/null | tr -d '\r' || true)"
                ROLE="$(printf '%s\n' "${RI}" | awk -F: '/^role:/{print $2}')"
                LINK="$(printf '%s\n' "${RI}" | awk -F: '/master_link_status:/{print $2}')"
                echo "attempt=${i} known_nodes=${KNOWN} state=${STATE} role=${ROLE} link=${LINK}"
                if [ "${KNOWN}" = "${EXPECTED_NODES}" ] && [ "${STATE}" = "ok" ] && [ "${ROLE}" = "slave" ] && [ "${LINK}" = "up" ]; then
                  echo "ISOLATED_NODE_REJOINED_OK"
                  exit 0
                fi
                sleep 15
              done

              echo "isolated victim ${VICTIM} was not rejoined within timeout"
              redis "${SEED}" cluster nodes || true
              exit 1
            check:
              (contains($stdout, 'ISOLATED_NODE_REJOINED_OK')): true

    - name: Assert cluster is healthy again
      try:
        - assert:
            file: ready-cluster.yaml
