---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: metrics-service-redis-replication
spec:
  steps:
    - name: Deploy Redis Replication with exporter
      try:
        - apply:
            file: secret.yaml
        - apply:
            file: replication.yaml
        - assert:
            file: ready-sts.yaml

    - name: Assert metrics service created
      try:
        - assert:
            file: ready-metrics-svc.yaml

    - name: Verify metrics service only exposes exporter port
      try:
        - script:
            timeout: 30s
            content: |
              #!/bin/bash
              set -e
              PORTS=$(kubectl get svc -n ${NAMESPACE} redis-replication-metrics-metrics -o jsonpath='{.spec.ports[*].port}')
              if [ "$PORTS" != "9121" ]; then
                echo "Expected metrics service to only expose port 9121, got: $PORTS"
                exit 1
              fi
              HAS_REDIS_PORT=$(kubectl get svc -n ${NAMESPACE} redis-replication-metrics-metrics -o jsonpath='{.spec.ports[?(@.port==6379)].port}')
              if [ -n "$HAS_REDIS_PORT" ]; then
                echo "Metrics service should not expose Redis port 6379"
                exit 1
              fi
              COMPONENT=$(kubectl get svc -n ${NAMESPACE} redis-replication-metrics-metrics -o jsonpath='{.metadata.labels.app\.kubernetes\.io/component}')
              if [ "$COMPONENT" != "metrics" ]; then
                echo "Expected app.kubernetes.io/component=metrics label, got: $COMPONENT"
                exit 1
              fi
              echo "Replication metrics service validation passed"
            check:
              (contains($stdout, 'Replication metrics service validation passed')): true

    - name: Verify metrics are fetchable via metrics service
      try:
        - script:
            timeout: 60s
            content: |
              #!/bin/bash
              set -e
              OUTPUT=$(kubectl run -n ${NAMESPACE} metrics-check --rm -i --restart=Never --image=busybox:1.36 -- \
                wget -qO- --timeout=10 http://redis-replication-metrics-metrics.${NAMESPACE}.svc.cluster.local:9121/metrics 2>&1)
              echo "$OUTPUT"
              if ! echo "$OUTPUT" | grep -q "redis_"; then
                echo "ERROR: No redis_ metrics found in output"
                exit 1
              fi
              echo "Metrics fetch validation passed"
            check:
              (contains($stdout, 'redis_')): true

    - name: Cleanup
      try:
        - delete:
            ref:
              name: redis-replication-metrics
              kind: RedisReplication
              apiVersion: redis.redis.opstreelabs.in/v1beta2
        - error:
            file: ready-metrics-svc.yaml
