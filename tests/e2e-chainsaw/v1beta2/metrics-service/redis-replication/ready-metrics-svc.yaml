---
apiVersion: v1
kind: Service
metadata:
  name: redis-replication-metrics-metrics
  labels:
    app: redis-replication-metrics
    redis_setup_type: replication
    role: replication
    app.kubernetes.io/component: metrics
  annotations:
    prometheus.io/port: "9121"
    prometheus.io/scrape: "true"
  ownerReferences:
    - apiVersion: redis.redis.opstreelabs.in/v1beta2
      controller: true
      kind: RedisReplication
      name: redis-replication-metrics
spec:
  type: ClusterIP
  ports:
    - name: redis-exporter
      port: 9121
      protocol: TCP
      targetPort: 9121
  selector:
    app: redis-replication-metrics
    redis_setup_type: replication
    role: replication
