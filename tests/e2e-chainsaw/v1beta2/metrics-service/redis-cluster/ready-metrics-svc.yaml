---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-metrics-leader-metrics
  labels:
    app: redis-cluster-metrics-leader
    redis_setup_type: cluster
    role: leader
    app.kubernetes.io/component: metrics
  annotations:
    prometheus.io/port: "9121"
    prometheus.io/scrape: "true"
  ownerReferences:
    - apiVersion: redis.redis.opstreelabs.in/v1beta2
      controller: true
      kind: RedisCluster
      name: redis-cluster-metrics
spec:
  type: ClusterIP
  ports:
    - name: redis-exporter
      port: 9121
      protocol: TCP
      targetPort: 9121
  selector:
    app: redis-cluster-metrics-leader
    redis_setup_type: cluster
    role: leader
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-metrics-follower-metrics
  labels:
    app: redis-cluster-metrics-follower
    redis_setup_type: cluster
    role: follower
    app.kubernetes.io/component: metrics
  annotations:
    prometheus.io/port: "9121"
    prometheus.io/scrape: "true"
  ownerReferences:
    - apiVersion: redis.redis.opstreelabs.in/v1beta2
      controller: true
      kind: RedisCluster
      name: redis-cluster-metrics
spec:
  type: ClusterIP
  ports:
    - name: redis-exporter
      port: 9121
      protocol: TCP
      targetPort: 9121
  selector:
    app: redis-cluster-metrics-follower
    redis_setup_type: cluster
    role: follower
