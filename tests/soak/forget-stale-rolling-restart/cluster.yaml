---
# 50-node pure-cache RedisCluster (25 leaders + 25 followers) for the
# forget-stale-node rolling-restart soak test. persistenceEnabled:false and no
# nodeConfVolume => ephemeral nodes.conf, so every restarted pod rejoins under a
# NEW node ID and leaves its old ID behind as a fail/noaddr orphan — exactly the
# condition ForgetStaleNodes must keep cleaning up under sustained churn.
#
# No anti-affinity (so 50 small pods schedule freely) and no password (keeps the
# soak driver's redis-cli probes simple). For a run on a cluster that cannot pull
# quay.io, swap the image to an artifactory mirror (see soak.sh / REDIS_IMAGE).
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-soak-50
spec:
  clusterSize: 25
  clusterVersion: v7
  persistenceEnabled: false
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  redisFollower:
    replicas: 25
  kubernetesConfig:
    image: quay.io/opstree/redis:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 101m
        memory: 128Mi
      limits:
        cpu: 101m
        memory: 128Mi
  redisExporter:
    enabled: false
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: IfNotPresent
